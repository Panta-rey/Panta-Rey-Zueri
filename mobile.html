<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#070912">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zürich Verkehr</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#070912;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Roboto,sans-serif;color:#e2e8f0;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* HEADER STATUS */
#statusbar{flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;transition:background .4s}
#statusbar.gruen{background:linear-gradient(135deg,rgba(20,83,45,0.55),rgba(7,9,18,0.3))}
#statusbar.gelb{background:linear-gradient(135deg,rgba(113,63,18,0.6),rgba(7,9,18,0.3))}
#statusbar.rot{background:linear-gradient(135deg,rgba(127,29,29,0.65),rgba(7,9,18,0.3))}
#stRow{display:flex;align-items:center;gap:12px}
#refreshBtn{flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#cbd5e0;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent}
#refreshBtn:active{background:rgba(255,255,255,0.18);transform:scale(0.92)}
#refreshIcon{display:inline-block}
#refreshBtn.spinning #refreshIcon{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#stIcon{font-size:34px;font-weight:800;line-height:1}
#statusbar.gruen #stIcon{color:#4ade80}
#statusbar.gelb #stIcon{color:#facc15}
#statusbar.rot #stIcon{color:#f87171}
#stText{flex:1}
#stMain{font-size:24px;font-weight:800;line-height:1.1}
#statusbar.gruen #stMain{color:#4ade80}
#statusbar.gelb #stMain{color:#facc15}
#statusbar.rot #stMain{color:#f87171}
#stSub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px}
#counts{display:flex;gap:8px;margin-top:12px}
.cnt{flex:1;background:rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;text-align:center}
.cnt .n{font-size:20px;font-weight:800;color:#fff}
.cnt .l{font-size:9px;color:#90a0c0;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cnt.stau .n{color:#f87171}
.cnt.bau .n{color:#fbbf24}

/* MAP */
#mapwrap{flex:1 1 auto;position:relative;overflow:hidden;background:#070912;min-height:0;touch-action:none}
#mapcanvas{position:absolute;top:0;left:0;width:100%;height:100%}
#mapHint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.35);background:rgba(0,0,0,0.4);padding:3px 10px;border-radius:10px;pointer-events:none;transition:opacity .5s}
#mapHint.hide{opacity:0}

/* MARKER POPUP */
#popup{position:absolute;z-index:60;background:rgba(13,20,34,0.97);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 13px;max-width:230px;box-shadow:0 8px 30px rgba(0,0,0,0.6);display:none;backdrop-filter:blur(10px)}
#popup.show{display:block}
#popupTitle{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
#popupTitle.stau::before{content:'● ';color:#ef4444}
#popupTitle.baustelle::before{content:'● ';color:#f59e0b}
#popupMeta{font-size:10px;color:#7da0d0;margin-bottom:5px}
#popupDesc{font-size:11px;color:#aab8d4;line-height:1.4}
#popupClose{position:absolute;top:6px;right:8px;color:#6678a0;font-size:16px;cursor:pointer;width:20px;height:20px;text-align:center}

/* MESSAGE LIST */
#list{flex:0 0 38%;overflow-y:auto;background:#0a0f1a;border-top:1px solid rgba(255,255,255,0.08);-webkit-overflow-scrolling:touch}
#listHead{position:sticky;top:0;background:#0a0f1a;padding:8px 14px;font-size:10px;font-weight:700;color:#5566a0;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,0.05);z-index:2}
.msg{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .15s}
.msg:active{background:rgba(40,72,128,0.4)}
.msg.nopos{opacity:0.55}
.msgTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.msgName{font-size:13px;font-weight:600;color:#e8eefc;flex:1}
.msgName.stau::before{content:'● ';color:#ef4444}
.msgName.baustelle::before{content:'● ';color:#f59e0b}
.msgTag{font-size:9px;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,0.08);color:#90a0c0;margin-left:6px;white-space:nowrap}
.msgTag.city{background:rgba(74,158,255,0.18);color:#7db8ff}
.msgDesc{font-size:11px;color:#8494b4;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#updated{text-align:center;font-size:10px;color:#404a6a;padding:8px}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#070912;z-index:100;flex-direction:column;gap:14px}
#loading.hide{display:none}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,0.1);border-top-color:#4ade80;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#errbox{position:absolute;bottom:12px;left:12px;right:12px;background:rgba(127,29,29,0.9);border-radius:10px;padding:10px 12px;font-size:11px;color:#fee;z-index:70;display:none}
#errbox.show{display:block}
</style>
</head>
<body>
<div id="app">
  <div id="statusbar" class="gruen">
    <div id="stRow">
      <div id="stIcon">●</div>
      <div id="stText">
        <div id="stMain">Freie Fahrt</div>
        <div id="stSub">Stadtkern Zürich</div>
      </div>
      <button id="refreshBtn" aria-label="Aktualisieren"><span id="refreshIcon">↻</span></button>
    </div>
    <div id="counts">
      <div class="cnt stau"><div class="n" id="cStau">0</div><div class="l">Stau Stadt</div></div>
      <div class="cnt bau"><div class="n" id="cBau">0</div><div class="l">Baustelle Stadt</div></div>
      <div class="cnt"><div class="n" id="cExt">0/0</div><div class="l">Umgebung S/B</div></div>
    </div>
  </div>
  <div id="mapwrap">
    <canvas id="mapcanvas"></canvas>
    <div id="mapHint">Pinch zum Zoomen · Marker antippen</div>
    <div id="popup">
      <div id="popupClose">✕</div>
      <div id="popupTitle"></div>
      <div id="popupMeta"></div>
      <div id="popupDesc"></div>
    </div>
  </div>
  <div id="list">
    <div id="listHead">Meldungen</div>
    <div id="listBody"></div>
    <div id="updated"></div>
  </div>
  <div id="errbox"></div>
  <div id="loading"><div class="spinner"></div><div style="font-size:13px;color:#8090b0">Verkehrslage wird geladen…</div></div>
</div>

function sc(nx,ny){

function invSc(px,py){

  if(GEO.water&&GEO.water.see)poly(GEO.water.see.pts,'#0c1e38','#122840',0.5);
  if(GEO.water){const rW=Math.max(0.8,zoom);if(GEO.water.limmat)line(GEO.water.limmat.pts,'#0e2850',rW);if(GEO.water.sihl)line(GEO.water.sihl.pts,'#0e2850',rW*0.8);}
  const ord=['secondary','primary_b','primary_a','motorway'];
  const sty={secondary:{c:'#4a5568',w:0.9,cas:'#0a0e18',cw:1.6},primary_b:{c:'#a0aec0',w:1.5,cas:'#0a0e18',cw:2.6},primary_a:{c:'#cbd5e0',w:2,cas:'#0a0e18',cw:3.6},motorway:{c:'#f0f4f8',w:3,cas:'#000',cw:5}};
  for(const t of ord){const s=sty[t],z=Math.max(0.5,Math.min(2,zoom*0.6));
    for(const r of GEO.roads)if(r.type===t)line(r.pts,s.cas,s.cw*z);
    for(const r of GEO.roads)if(r.type===t)line(r.pts,s.c,s.w*z);}
  // Quartier-Labels
  const lblA=Math.min(1,Math.max(0,(zoom-0.7)*2.5));
  if(lblA>0.05){ctx.textAlign='center';ctx.textBaseline='middle';
    for(const l of GEO.q_labels){const sz=Math.max(8,Math.min(12,9*zoom*0.5));const[sx,sy]=sc(l.pt[0],l.pt[1]);
      ctx.font=`${sz}px sans-serif`;ctx.globalAlpha=lblA;ctx.fillStyle='rgba(140,160,210,0.8)';ctx.fillText(l.name,sx,sy);}
    ctx.globalAlpha=1;}
  // Marker
  const pulse=0.5+0.5*Math.sin(Date.now()*0.004);
  for(const m of MARKERS){if(!m.pos)continue;
    const[sx,sy]=sc(m.pos[0],m.pos[1]);
    const col=m.stau?'#ef4444':m.baustelle?'#f59e0b':'#22c55e';
    const r=Math.max(5,8*Math.min(2,zoom*0.5));
    ctx.beginPath();ctx.arc(sx,sy,r*(2+pulse),0,Math.PI*2);ctx.fillStyle=col+'22';ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle=m.in_city?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.5)';
    ctx.lineWidth=1.5;if(!m.in_city)ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([]);}
}
function resize(){
  const wrap=document.getElementById('mapwrap');
  W=wrap.clientWidth;H=wrap.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,3);
  // Physische Canvas-Auflösung = CSS-Größe × Pixeldichte (scharf auf Retina)
  cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);
  cv.style.width=W+'px';cv.style.height=H+'px';
  // Context so skalieren, dass alle Zeichen-Koordinaten weiter in CSS-Pixeln (W,H) rechnen
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const aspect=1.0565, sAspect=W/H;
  if(sAspect>aspect){mapH=H;mapW=H*aspect;offX=(W-mapW)/2;offY=0;}
  else{mapW=W;mapH=W/aspect;offX=0;offY=(H-mapH)/2;}
}
function animate(){draw();requestAnimationFrame(animate);}

// ---- Daten laden ----
async function loadTraffic(){
  try{
    const r=await fetch(WORKER_URL,{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json();
    LAST=d;MARKERS=d.meldungen||[];
    setStatus(d);renderList(d);
    document.getElementById('errbox').classList.remove('show');
    document.getElementById('loading').classList.add('hide');
  }catch(e){
    showErr("Daten konnten nicht geladen werden: "+e.message+". Läuft der Worker? URL korrekt?");
    document.getElementById('loading').classList.add('hide');
  }
}
function showErr(msg){const e=document.getElementById('errbox');e.textContent=msg;e.classList.add('show');}
function setStatus(d){
  const st=d.status||'gruen';
  document.getElementById('statusbar').className=st;
  const txt={rot:'Stau',gelb:'Vorsicht',gruen:'Freie Fahrt'};
  const icn={rot:'⚠',gelb:'!',gruen:'●'};
  document.getElementById('stMain').textContent=txt[st];
  document.getElementById('stIcon').textContent=icn[st];
  document.getElementById('cStau').textContent=d.stadt_stau||0;
  document.getElementById('cBau').textContent=d.stadt_bau||0;
  document.getElementById('cExt').textContent=`${d.ext_stau||0}/${d.ext_bau||0}`;
}
function renderList(d){
  const body=document.getElementById('listBody');
  body.innerHTML='';
  const msgs=(d.meldungen||[]).slice().sort((a,b)=>(b.in_city?1:0)-(a.in_city?1:0));
  document.getElementById('listHead').textContent=`Meldungen (${msgs.length})`;
  if(msgs.length===0){body.innerHTML='<div style="padding:20px;text-align:center;color:#556;font-size:13px">Keine Meldungen · alle Strecken frei</div>';}
  msgs.forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='msg'+(m.pos?'':' nopos');
    const cls=m.stau?'stau':m.baustelle?'baustelle':'';
    const tag=m.in_city?'<span class="msgTag city">Stadt</span>':'<span class="msgTag">Umgebung</span>';
    const ende=m.ende?` · bis ${m.ende}`:'';
    div.innerHTML=`<div class="msgTop"><span class="msgName ${cls}">${esc(m.strasse)}</span>${tag}</div><div class="msgDesc">${esc(m.desc)}${ende}</div>`;
    if(m.pos) div.onclick=()=>locateMarker(m);
    body.appendChild(div);
  });
  if(d.updated){const t=new Date(d.updated);document.getElementById('updated').textContent=`Aktualisiert ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')} Uhr`;}
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

// ---- Touch 3: Liste antippen -> zur Stelle auf Karte ----
function locateMarker(m){
  if(!m.pos)return;
  zoom=2.4;
  // Zentriere die Karte auf den Marker
  const targetVx=(m.pos[0]-VIEW_MIN)/VIEW_SPAN, targetVy=(m.pos[1]-VIEW_MIN)/VIEW_SPAN;
  panX=(0.5-targetVx)*mapW*zoom;
  panY=(0.5-(1-targetVy))*mapH*zoom;
  document.getElementById('mapwrap').scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(()=>showPopup(m),350);
}
// ---- Touch 2: Marker-Popup ----
function showPopup(m){
  const[sx,sy]=sc(m.pos[0],m.pos[1]);
  const p=document.getElementById('popup');
  document.getElementById('popupTitle').textContent=m.strasse;
  document.getElementById('popupTitle').className=m.stau?'stau':m.baustelle?'baustelle':'';
  const kind=m.stau?'Stau':m.baustelle?'Baustelle':'Meldung';
  const ort=m.in_city?'Stadtkern':'Umgebung';
  document.getElementById('popupMeta').textContent=`${kind} · ${ort}${m.ende?' · bis '+m.ende:''}`;
  document.getElementById('popupDesc').textContent=m.desc;
  p.classList.add('show');
  let px=sx+14, py=sy-10;
  if(px+230>W)px=sx-244;if(px<6)px=6;
  if(py+120>H)py=H-130;if(py<6)py=6;
  p.style.left=px+'px';p.style.top=py+'px';
}
document.getElementById('popupClose').onclick=(e)=>{e.stopPropagation();document.getElementById('popup').classList.remove('show');};

// ---- Touch 1: Pinch-Zoom & Pan ----
const mapwrap=document.getElementById('mapwrap');
let touchMode=null, startDist=0, startZoom=1, startPanX=0, startPanY=0, startCx=0, startCy=0;
let lastTapTime=0;
mapwrap.addEventListener('touchstart',e=>{
  document.getElementById('mapHint').classList.add('hide');
  if(e.touches.length===2){
    touchMode='pinch';
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    startDist=Math.hypot(dx,dy);startZoom=zoom;
    startPanX=panX;startPanY=panY;
  }else if(e.touches.length===1){
    touchMode='pan';
    startCx=e.touches[0].clientX;startCy=e.touches[0].clientY;
    startPanX=panX;startPanY=panY;
  }
},{passive:true});
mapwrap.addEventListener('touchmove',e=>{
  if(touchMode==='pinch'&&e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    zoom=Math.max(0.8,Math.min(6,startZoom*(dist/startDist)));
  }else if(touchMode==='pan'&&e.touches.length===1){
    panX=startPanX+(e.touches[0].clientX-startCx);
    panY=startPanY+(e.touches[0].clientY-startCy);
  }
},{passive:true});
mapwrap.addEventListener('touchend',e=>{
  if(touchMode==='pan'&&e.changedTouches.length){
    const moved=Math.hypot(e.changedTouches[0].clientX-startCx, e.changedTouches[0].clientY-startCy);
    if(moved<8){
      // Tap -> Marker-Treffer prüfen
      const rect=mapwrap.getBoundingClientRect();
      const tx=e.changedTouches[0].clientX-rect.left, ty=e.changedTouches[0].clientY-rect.top;
      let hit=null, best=28;
      for(const m of MARKERS){if(!m.pos)continue;const[mx,my]=sc(m.pos[0],m.pos[1]);const dd=Math.hypot(mx-tx,my-ty);if(dd<best){best=dd;hit=m;}}
      if(hit)showPopup(hit);
      else document.getElementById('popup').classList.remove('show');
    }
  }
  touchMode=null;
},{passive:true});

// ---- Refresh-Button (oben rechts) ----
const refreshBtn=document.getElementById('refreshBtn');
let refreshing=false;
refreshBtn.addEventListener('click',()=>{
  if(refreshing)return;
  refreshing=true;refreshBtn.classList.add('spinning');
  loadTraffic().finally(()=>{
    setTimeout(()=>{refreshBtn.classList.remove('spinning');refreshing=false;},500);
  });
});

// ---- Init ----
window.addEventListener('resize',()=>{resize();});
resize();animate();loadTraffic();
setInterval(loadTraffic,120000); // alle 2 Min auto-refresh
</script>
